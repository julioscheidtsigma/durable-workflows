<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Node Flowchart</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: system-ui, sans-serif;
    background: #f5f4f0;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
    min-height: 100vh;
  }
  .chart-wrap {
    width: 100%;
    max-width: 720px;
  }
  svg {
    width: 100%;
    display: block;
  }
  .node-rect {
    rx: 8;
    cursor: default;
  }
  text {
    font-family: system-ui, sans-serif;
  }
</style>
</head>

<body>
<div>
  <div id="loading" style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:60px;color:#888">
    <svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="12" fill="none" stroke="#ccc" stroke-width="3"/>
      <path d="M16 4a12 12 0 0 1 12 12" fill="none" stroke="#888" stroke-width="3" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 16 16" to="360 16 16" dur=".8s" repeatCount="indefinite"/>
      </path>
    </svg>
    <span style="font-size:14px">Loading graph</span>
  </div>
  
  <div id="error" style="display:none;flex-direction:column;align-items:center;gap:8px;padding:60px;color:#a32d2d">
    <span style="font-size:14px;font-weight:500">Failed to load graph</span>
    <span id="error-msg" style="font-size:12px;color:#888"></span>
    <button onclick="init()" style="margin-top:8px;padding:6px 16px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px">
      Retry
    </button>
  </div>
  
  <div id="message" style="display:none;flex-direction:column;align-items:center;gap:8px;padding:60px;color:#888">
    <span style="font-size:14px;font-weight:500">Nothing to show</span>
  </div>
  
  <div id="chart-wrap" class="chart-wrap" style="display:none">
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:10px;color:#888">
      <button onclick="toggleAutoRefresh()" style="margin-top:8px;padding:6px 16px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;margin-left:32px;">
        Toggle Auto-Refresh
      </button>
    </div>  
    
    <svg id="chart"></svg>
  </div>
</div>

<script>
let dummyData = {
  "0": [
    { node: "Level0", children: ["DataCollectionModule","EvidencesCollectionModule"], skipped: false, failed: false },
  ],
  "1": [
    { node: "DataCollectionModule", children: ["Level2"], skipped: false, failed: false },
    { node: "EvidencesCollectionModule", children: ["Level2"], skipped: false, failed: false },
  ],
  "2": [
    { node: "Level2", children: ["PepModule","SanctionsModule"], skipped: false, failed: false },
  ],
  "3": [
    { node: "PepModule", children: ["Level4"], skipped: false, failed: false },
    { node: "SanctionsModule", children: ["Level4"], skipped: false, failed: false },
  ],
  "4": [
    { node: "Level4", children: ["SynthesisModule"], skipped: false, failed: false },
  ],
  "5": [
    { node: "SynthesisModule", children: [], skipped: false, failed: false },
  ]
};
let data = null;
let interval = null;

const COLORS = {
  green:  { fill: "#D0F0E4", stroke: "#1D9E75", text: "#085041" },
  gray:   { fill: "#E8E7E0", stroke: "#888780", text: "#444441" },
  red:    { fill: "#F8D0D0", stroke: "#A32D2D", text: "#5A1B1B" },
  blue:   { fill: "#D0E8F8", stroke: "#1B7FA3", text: "#083745" },
};

const baseAPI = "http://localhost:8585";

// Assign color per level
const defaultColor = "green";
const disabledColor = "gray";
const failedColor = "red";
const levelStartColor = "blue";

const W = 680, ROW_H = 100, NODE_H = 44, LABEL_W = 36, PADDING = 40;

function buildLayout() {
  const levels = Object.keys(data).map(Number).sort((a,b) => a-b);
  const nodePos = {}; // node -> {x, y, w}

  levels.forEach(lvl => {
    const nodes = data[lvl];
    const usable = W - PADDING * 2 - LABEL_W;
    const nodeW = Math.min(220, Math.max(140, Math.floor(usable / nodes.length) - 16));
    const totalW = nodes.length * nodeW + (nodes.length - 1) * 16;
    const startX = PADDING + LABEL_W + (usable - totalW) / 2;
    const y = PADDING + lvl * ROW_H;

    nodes.forEach((n, i) => {
      const x = startX + i * (nodeW + 16);
      nodePos[n.node] = { x, y, w: nodeW, h: NODE_H, lvl };
    });
  });

  return { levels, nodePos };
}

function render() {
  const svg = document.getElementById("chart");
  if (!Object.keys(data).length) return;
  const { levels, nodePos } = buildLayout();
  const totalLevels = levels.length;
  const svgH = PADDING + (totalLevels - 1) * ROW_H + NODE_H + PADDING;

  svg.setAttribute("viewBox", `0 0 ${W} ${svgH}`);
  svg.setAttribute("height", svgH);

  let html = `<defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>`;

  // Level labels
  levels.forEach(lvl => {
    const y = PADDING + lvl * ROW_H + NODE_H / 2;
    html += `<text x="${PADDING + LABEL_W / 2}" y="${y}" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888">Level ${lvl}</text>`;
  });

  // Edges (draw first so nodes appear on top)
  levels.forEach(lvl => {
    data[lvl].forEach(({ node, children }) => {
      const from = nodePos[node];
      if (!from) return;
      children.forEach(child => {
        const to = nodePos[child];
        if (!to) return;
        const x1 = from.x + from.w / 2, y1 = from.y + from.h;
        const x2 = to.x + to.w / 2,   y2 = to.y;
        // Use a cubic bezier for smooth curves
        const my = (y1 + y2) / 2;
        html += `<path d="M${x1} ${y1} C${x1} ${my} ${x2} ${my} ${x2} ${y2}" fill="none" stroke="#bbb" stroke-width="1.2" marker-end="url(#arrow)"/>`;
      });
    });
  });

  // Nodes
  levels.forEach(lvl => {
    data[lvl].forEach(({ node, skipped, failed }) => {
      let label = node.length > 16 ? node.slice(0, 14) + "…" : node;

      const { x, y, w, h } = nodePos[node];
      const cx = x + w / 2;

      let color = COLORS[defaultColor];
      if (node.startsWith("Level")) {
        color = COLORS[levelStartColor];
        label = label + " (start)";
      } else if (skipped) {
        color = COLORS[disabledColor];
        label = label + " (skipped)";
      } else if (failed) {
        color = COLORS[failedColor];
        label = label + " (failed)";
      }

      html += `
        <g>
          <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8"
            fill="${color.fill}" stroke="${color.stroke}" stroke-width="1"/>
          <text x="${cx}" y="${y + h/2}" text-anchor="middle" dominant-baseline="central"
            font-size="13" font-weight="500" fill="${color.text}">${label}</text>
        </g>`;
    });
  });

  svg.innerHTML = html;
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const uuid = params.get("uuid") || null;
  console.log('uuid', uuid);
  if (!uuid) {
    showState("message");
    return;
  }
  const endpoint = `${baseAPI}/workflow/${uuid}/graph`;
  showState("loading");
  try {
    const res = await fetch(endpoint);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
    console.log('data', data);
    showState("chart-wrap");
    render();
    window.addEventListener("resize", render);
  } catch (err) {
    console.error("Failed to fetch graph data:", err);
    if (!data) {
      showState("error", err.message);
    } else {
      showState("chart-wrap");
    }
    if (interval) {
      clearInterval(interval);
      interval = null;
    }
  }
}

function showState(state, msg = "") {
  document.getElementById("loading").style.display    = state === "loading"    ? "flex" : "none";
  document.getElementById("error").style.display      = state === "error"      ? "flex" : "none";
  document.getElementById("message").style.display    = state === "message"    ? "flex" : "none";
  document.getElementById("chart-wrap").style.display = state === "chart-wrap" ? "block" : "none";
  if (msg) document.getElementById("error-msg").textContent = msg;
}

function startInterval(delaySeconds = 3000) {
  interval = setInterval(() => {
    console.log("Checking for updates...");
    init();
  }, delaySeconds);
}

function toggleAutoRefresh() {
  if (interval) {
    clearInterval(interval);
    interval = null;
  } else {
    startInterval();
  }
}

init();
startInterval();
</script>
</body>
</html>
